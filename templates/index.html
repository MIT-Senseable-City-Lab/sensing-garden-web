{% extends "base.html" %}

{% block title %}Overview - Sensing Garden Admin{% endblock %}

{% block content %}
<section class="page-header">
    <h1>Overview</h1>
    <p class="page-subtitle">API-backed snapshot of the main backend entities.</p>
</section>

<div class="row">
    {% for item in counts %}
    <div class="col-sm-6 col-lg-3 mb-3">
        <a href="{{ url_for(item.endpoint) }}" class="text-decoration-none text-reset">
            <div class="overview-card">
                <div class="card-body">
                    <div class="text-muted small text-uppercase">{{ item.name }}</div>
                    <div class="count-value mt-2">{{ item.count }}</div>
                </div>
            </div>
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
