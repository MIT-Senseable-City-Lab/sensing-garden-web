{% extends "base.html" %}

{% block title %}Logs - Sensing Garden Admin{% endblock %}

{% block content %}
<section class="page-header">
    <h2>Logs</h2>
    <p class="page-subtitle">Rolling activity from the dashboard, backend, S3, and bugcam.</p>
</section>

<form id="activity-filter" class="filter-panel">
    <div class="form-row">
        <div class="form-group col-md-2">
            <label for="source">Source</label>
            <select class="form-control form-control-sm" id="source" name="source">
                <option value="">All</option>
                {% for option in sources %}
                <option value="{{ option }}" {% if source == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group col-md-3">
            <label for="device_id">Device ID</label>
            <input type="text" class="form-control form-control-sm" id="device_id" name="device_id" value="{{ device_id }}">
        </div>
        <div class="form-group col-md-4">
            <label for="q">Search</label>
            <input type="text" class="form-control form-control-sm" id="q" name="q" value="{{ query }}">
        </div>
        <div class="form-group col-md-2">
            <label for="limit">Rows</label>
            <select class="form-control form-control-sm" id="limit" name="limit">
                {% for option in ["25", "50", "100", "200"] %}
                <option value="{{ option }}" {% if limit|string == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <button type="submit" class="btn btn-sm btn-primary">Apply Filters</button>
    <a href="{{ url_for('admin_logs') }}" class="btn btn-sm btn-outline-secondary">Reset</a>
    <div class="custom-control custom-switch d-inline-block ml-3">
        <input type="checkbox" class="custom-control-input" id="live-logs">
        <label class="custom-control-label" for="live-logs">Live</label>
    </div>
    <span id="activity-status" class="ml-3 text-muted small"></span>
</form>

<div class="table-wrap">
    <div class="table-responsive">
        <table class="table table-sm table-hover table-admin">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Source</th>
                    <th>Device</th>
                    <th>Event</th>
                    <th>Message</th>
                    <th>S3 Key / Path</th>
                </tr>
            </thead>
            <tbody id="activity-rows">
                <tr><td colspan="6" class="text-muted">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var LIVE_POLL_MS = 2000;
var ERROR_LEVELS = ['ERROR', 'CRITICAL', 'FATAL'];
var liveTimer = null;
var loadingActivity = false;

function escapeHtml(value) {
    var node = document.createElement('span');
    node.textContent = value == null ? '' : String(value);
    return node.innerHTML;
}

function cell(value) {
    return escapeHtml(value);
}

function hasErrorStatus(item) {
    return Number(item.status_code) >= 400;
}

function hasErrorLevel(item) {
    return ERROR_LEVELS.indexOf(String(item.level || '').toUpperCase()) !== -1;
}

function isErrorActivity(item) {
    return hasErrorStatus(item) || hasErrorLevel(item);
}

function rowClass(item) {
    return isErrorActivity(item) ? ' class="table-danger"' : '';
}

function renderRows(items) {
    if (!items.length) {
        return '<tr><td colspan="6" class="text-muted">No activity found.</td></tr>';
    }
    return items.map(function(item) {
        var keyOrPath = item.s3_key || item.path || '';
        return '<tr' + rowClass(item) + '>' +
            '<td>' + cell(item.timestamp_display) + '</td>' +
            '<td><code>' + cell(item.source) + '</code></td>' +
            '<td>' + cell(item.device_id) + '</td>' +
            '<td>' + cell(item.event_type) + '</td>' +
            '<td>' + cell(item.message) + '</td>' +
            '<td><code>' + cell(keyOrPath) + '</code></td>' +
            '</tr>';
    }).join('');
}

function activityParams() {
    var form = document.getElementById('activity-filter');
    return new URLSearchParams(new FormData(form));
}

function setStatus(message) {
    document.getElementById('activity-status').textContent = message;
}

function scheduleLivePoll() {
    if (!document.getElementById('live-logs').checked) {
        return;
    }
    clearLivePoll();
    liveTimer = window.setTimeout(function() {
        liveTimer = null;
        loadActivity();
    }, LIVE_POLL_MS);
}

function clearLivePoll() {
    if (liveTimer) {
        window.clearTimeout(liveTimer);
        liveTimer = null;
    }
}

function setLiveEnabled(enabled) {
    clearLivePoll();
    setStatus(enabled ? 'Live: on' : 'Live: off');
    if (enabled) {
        loadActivity();
    }
}

function loadActivity() {
    if (loadingActivity) {
        scheduleLivePoll();
        return;
    }
    clearLivePoll();
    loadingActivity = true;
    var rows = document.getElementById('activity-rows');
    setStatus('Loading...');
    fetch('/api/admin/activity?' + activityParams().toString())
        .then(function(response) {
            if (!response.ok) {
                throw new Error('activity request failed');
            }
            return response.json();
        })
        .then(function(data) {
            rows.innerHTML = renderRows(data.items || []);
            var updated = new Date().toLocaleTimeString();
            setStatus((data.count || 0) + ' event(s) - Last updated ' + updated);
        })
        .catch(function() {
            setStatus('Error loading logs');
        })
        .finally(function() {
            loadingActivity = false;
            scheduleLivePoll();
        });
}

document.getElementById('activity-filter').addEventListener('submit', function(e) {
    e.preventDefault();
    loadActivity();
});

document.getElementById('live-logs').addEventListener('change', function(e) {
    setLiveEnabled(e.target.checked);
});

window.addEventListener('beforeunload', clearLivePoll);

loadActivity();
</script>
{% endblock %}
